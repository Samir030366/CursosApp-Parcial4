<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${curso.id != null} ? 'Editar Curso' : 'Nuevo Curso'"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<header th:insert="~{fragments/menu :: menu-principal}"></header>
    <div class="container mt-4">
        <div class="row">
            <div class="col-md-8 offset-md-2">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h4 th:text="${curso.id != null} ? 'Editar Curso' : 'Nuevo Curso'"></h4>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/cursos/guardar}" method="post" th:object="${curso}">

                            <!-- ID oculto -->
                            <input type="hidden" th:field="*{id}">

                            <div class="row">
                                <div class="col-md-8 mb-3">
                                    <label class="form-label">Nombre del Curso</label>
                                    <input type="text" class="form-control" th:field="*{nombre}" required>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label class="form-label">Costo ($)</label>
                                    <input type="number" step="0.01" class="form-control" th:field="*{costo}">
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Descripción</label>
                                <textarea class="form-control" th:field="*{descripcion}" rows="3"></textarea>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Fecha de Inicio</label>
                                    <input type="date" class="form-control" th:field="*{fechaInicio}">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Fecha de Fin</label>
                                    <input type="date" class="form-control" th:field="*{fechaFin}">
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Categoría</label>
                                    <select class="form-select" th:field="*{categoria.id}" required>
                                        <option value="">-- Seleccione una categoría --</option>
                                        <option th:each="cat : ${categorias}" 
                                                th:value="${cat.id}" 
                                                th:text="${cat.nombre}"
                                                th:selected="${curso.categoria != null && curso.categoria.id == cat.id}">
                                        </option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">¿Es destacado?</label><br>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" th:field="*{destacado}" th:value="true">
                                        <label class="form-check-label">Sí</label>
                                    </div>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" th:field="*{destacado}" th:value="false" checked>
                                        <label class="form-check-label">No</label>
                                    </div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Nombre de la Imagen</label>
                                <input type="text" class="form-control" th:field="*{imagen}" placeholder="ejemplo: curso1.png">
                            </div>

                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <a th:href="@{/cursos}" class="btn btn-secondary me-md-2">Cancelar</a>
                                <button type="submit" class="btn btn-success">Guardar Curso</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
