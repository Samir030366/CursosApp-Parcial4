<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado de Cursos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<header th:insert="~{fragments/menu :: menu-principal}"></header>
    <div class="container mt-4">
        <h2 class="mb-4">Listado de Cursos</h2>

        <a th:href="@{/cursos/nuevo}" class="btn btn-primary mb-3">Nuevo Curso</a>

        <table class="table table-striped table-hover">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Categoría</th>
                    <th>Costo</th>
                    <th>Destacado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="curso : ${cursos}">
                    <td th:text="${curso.id}"></td>
                    <td th:text="${curso.nombre}"></td>
                    <td th:text="${curso.categoria != null} ? ${curso.categoria.nombre} : 'Sin categoría'"></td>
                    <td th:text="${curso.costo}"></td>
                    <td>
                        <span th:if="${curso.destacado}" class="badge bg-success">Sí</span>
                        <span th:unless="${curso.destacado}" class="badge bg-secondary">No</span>
                    </td>
                    <td>
                        <a th:href="@{/cursos/editar/{id}(id=${curso.id})}" class="btn btn-warning btn-sm">Editar</a>
                        <a th:href="@{/cursos/eliminar/{id}(id=${curso.id})}" 
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('¿Estás seguro de eliminar este curso?')">Eliminar</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
