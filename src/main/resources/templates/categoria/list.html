<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado de Categorías</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <header th:insert="~{fragments/menu :: menu-principal}"></header>

    <div class="container mt-4">
        <h2 class="mb-4">Listado de Categorías</h2>

        <a th:href="@{/categorias/nueva}" class="btn btn-primary mb-3">Nueva Categoría</a>

        <table class="table table-striped table-hover">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Descripción</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="cat : ${categorias}">
                    <td th:text="${cat.id}"></td>
                    <td th:text="${cat.nombre}"></td>
                    <td th:text="${cat.descripcion}"></td>
                    <td>
                        <a th:href="@{/categorias/editar/{id}(id=${cat.id})}" class="btn btn-warning btn-sm">Editar</a>
                        <a th:href="@{/categorias/eliminar/{id}(id=${cat.id})}" 
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('¿Estás seguro de eliminar esta categoría?')">Eliminar</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <footer th:insert="~{fragments/footer :: pie-pagina}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
