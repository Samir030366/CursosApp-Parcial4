<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>CursosApp | Plataforma de Cursos en Línea</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <header th:insert="~{fragments/menu :: menu-principal}"></header>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8 text-center">
                <h1 class="display-4 fw-bold">Bienvenido a CursosApp</h1>
                <p class="lead mt-3">Plataforma para la gestión de cursos en línea</p>
                <hr class="my-4">

                <div class="d-grid gap-3 d-md-flex justify-content-md-center">
                    <a th:href="@{/cursos}" class="btn btn-primary btn-lg px-5">
                        Ver Cursos
                    </a>
                    <a th:href="@{/categorias}" class="btn btn-outline-secondary btn-lg px-5">
                        Gestionar Categorías
                    </a>
                </div>

                <div class="mt-5">
                    <p class="text-muted">Examen Parcial 4 - Programación 3</p>
                </div>
            </div>
        </div>
    </div>

    <footer th:insert="~{fragments/footer :: pie-pagina}"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
